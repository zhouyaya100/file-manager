{% extends "base.html" %}

{% block title %}我的分享 - 文件管理系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-share-alt"></i> 我的分享</h2>
        <button class="btn btn-outline-secondary" onclick="location.href='/'">
            <i class="fas fa-arrow-left"></i> 返回
        </button>
    </div>

    <!-- 分享列表 -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>文件名</th>
                            <th>类型</th>
                            <th>密码保护</th>
                            <th>下载次数</th>
                            <th>创建时间</th>
                            <th>过期时间</th>
                            <th>状态</th>
                            <th width="200">操作</th>
                        </tr>
                    </thead>
                    <tbody id="shares-list">
                        <tr>
                            <td colspan="8" class="text-center text-muted py-5">
                                <i class="fas fa-spinner fa-spin fa-2x"></i>
                                <p class="mt-2">加载中...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <nav aria-label="Page navigation" id="pagination" style="display: none;">
                <ul class="pagination justify-content-center" id="pagination-list"></ul>
            </nav>

            <!-- 空状态 -->
            <div id="empty-state" class="text-center py-5" style="display: none;">
                <i class="fas fa-share-alt fa-4x text-muted mb-3"></i>
                <h5 class="text-muted">暂无分享</h5>
                <p class="text-muted">在文件列表中创建分享链接</p>
            </div>
        </div>
    </div>
</div>

<!-- 创建分享模态框 -->
<div class="modal fade" id="createShareModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">创建分享链接</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="share-form">
                    <input type="hidden" id="share-file-path">
                    
                    <div class="mb-3">
                        <label class="form-label">文件</label>
                        <input type="text" class="form-control" id="share-file-name" readonly>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">访问密码（可选）</label>
                        <input type="text" class="form-control" id="share-password" 
                               placeholder="留空则无需密码">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">最大下载次数（可选）</label>
                        <input type="number" class="form-control" id="share-max-downloads" 
                               placeholder="留空则无限制" min="1">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">过期天数（可选）</label>
                        <input type="number" class="form-control" id="share-expire-days" 
                               placeholder="留空则永不过期" min="1">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitShare()">创建分享</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

// 加载分享列表
function loadShares(page = 1) {
    fetch(`/api/shares?page=${page}&per_page=20`)
        .then(response => response.json())
        .then(data => {
            currentPage = data.current_page;
            renderSharesList(data);
            renderPagination(data);
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('shares-list').innerHTML = `
                <tr>
                    <td colspan="8" class="text-center text-danger">
                        <i class="fas fa-exclamation-triangle"></i> 加载失败
                    </td>
                </tr>
            `;
        });
}

// 渲染分享列表
function renderSharesList(data) {
    const tbody = document.getElementById('shares-list');
    
    if (data.shares.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('pagination').style.display = 'none';
        tbody.innerHTML = '';
        return;
    }
    
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('pagination').style.display = 'block';
    
    tbody.innerHTML = data.shares.map(share => `
        <tr data-id="${share.id}">
            <td>
                <i class="fas ${share.is_folder ? 'fa-folder' : 'fa-file'} text-${share.is_folder ? 'warning' : 'secondary'}"></i>
                ${escapeHtml(share.file_name)}
            </td>
            <td>${share.is_folder ? '文件夹' : '文件'}</td>
            <td>${share.password_protected ? '<i class="fas fa-lock text-success"></i> 是' : '<span class="text-muted">否</span>'}</td>
            <td>${share.download_count}${share.max_downloads ? ' / ' + share.max_downloads : ''}</td>
            <td>${formatDate(share.created_at)}</td>
            <td>${share.expire_at ? formatDate(share.expire_at) : '<span class="text-muted">永不过期</span>'}</td>
            <td>
                ${share.is_active && !share.is_expired && share.can_download 
                    ? '<span class="badge bg-success">有效</span>' 
                    : '<span class="badge bg-secondary">失效</span>'}
            </td>
            <td>
                <button class="btn btn-sm btn-outline-primary" onclick="copyShareLink('${share.share_token}')" title="复制链接">
                    <i class="fas fa-link"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteShare(${share.id})" title="取消分享">
                    <i class="fas fa-times"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

// 分页渲染
function renderPagination(data) {
    const paginationList = document.getElementById('pagination-list');
    
    if (data.pages <= 1) {
        document.getElementById('pagination').style.display = 'none';
        return;
    }
    
    let html = '';
    html += `<li class="page-item ${!data.has_prev ? 'disabled' : ''}">
        <a class="page-link" href="#" onclick="loadShares(${data.current_page - 1}); return false;">
            <i class="fas fa-chevron-left"></i>
        </a>
    </li>`;
    
    for (let i = 1; i <= data.pages; i++) {
        if (i === 1 || i === data.pages || (i >= data.current_page - 2 && i <= data.current_page + 2)) {
            html += `<li class="page-item ${i === data.current_page ? 'active' : ''}">
                <a class="page-link" href="#" onclick="loadShares(${i}); return false;">${i}</a>
            </li>`;
        } else if (i === data.current_page - 3 || i === data.current_page + 3) {
            html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
        }
    }
    
    html += `<li class="page-item ${!data.has_next ? 'disabled' : ''}">
        <a class="page-link" href="#" onclick="loadShares(${data.current_page + 1}); return false;">
            <i class="fas fa-chevron-right"></i>
        </a>
    </li>`;
    
    paginationList.innerHTML = html;
}

// 创建分享
function createShare(filePath, fileName) {
    document.getElementById('share-file-path').value = filePath;
    document.getElementById('share-file-name').value = fileName;
    document.getElementById('share-password').value = '';
    document.getElementById('share-max-downloads').value = '';
    document.getElementById('share-expire-days').value = '';
    
    const modal = new bootstrap.Modal(document.getElementById('createShareModal'));
    modal.show();
}

// 提交分享
function submitShare() {
    const filePath = document.getElementById('share-file-path').value;
    const password = document.getElementById('share-password').value;
    const maxDownloads = document.getElementById('share-max-downloads').value;
    const expireDays = document.getElementById('share-expire-days').value;
    
    fetch(`/api/file/${encodeURIComponent(filePath)}/share`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            password: password || null,
            max_downloads: maxDownloads ? parseInt(maxDownloads) : null,
            expire_days: expireDays ? parseInt(expireDays) : null
        })
    })
    .then(response => {
        if (response.ok) {
            return response.json();
        } else {
            return response.json().then(data => Promise.reject(data.error));
        }
    })
    .then(data => {
        showFlash('分享创建成功', 'success');
        bootstrap.Modal.getInstance(document.getElementById('createShareModal')).hide();
        loadShares(1);
    })
    .catch(error => {
        showFlash('创建失败：' + error, 'danger');
    });
}

// 复制链接
function copyShareLink(token) {
    const url = `${window.location.origin}/share/${token}`;
    navigator.clipboard.writeText(url).then(() => {
        showFlash('链接已复制到剪贴板', 'success');
    }).catch(() => {
        showFlash('复制失败', 'danger');
    });
}

// 取消分享
function deleteShare(shareId) {
    if (!confirm('确定要取消这个分享吗？链接将立即失效。')) return;
    
    fetch(`/api/share/${shareId}`, { method: 'DELETE' })
        .then(response => {
            if (response.ok) {
                showFlash('分享已取消', 'success');
                loadShares(currentPage);
            } else {
                return response.json().then(data => Promise.reject(data.error));
            }
        })
        .catch(error => {
            showFlash('取消失败：' + error, 'danger');
        });
}

// 辅助函数
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatDate(isoString) {
    if (!isoString) return '-';
    const date = new Date(isoString);
    return date.toLocaleString('zh-CN');
}

function showFlash(message, type = 'info') {
    const flashContainer = document.getElementById('flash-messages');
    if (flashContainer) {
        const alert = document.createElement('div');
        alert.className = `alert alert-${type} alert-dismissible fade show`;
        alert.innerHTML = `${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
        flashContainer.appendChild(alert);
        setTimeout(() => alert.remove(), 5000);
    } else {
        alert(message);
    }
}

// 页面加载时初始化
document.addEventListener('DOMContentLoaded', function() {
    loadShares(1);
});
</script>
{% endblock %}
